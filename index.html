<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AI Persona Chat</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <header>
        <h2>AI Persona Chat</h2>

        <p>
          Type <b>hey persona1=HC</b> or <b>hey persona2=PG</b> to switch
          personas.
        </p>
      </header>

      <div id="chat-box"></div>

      <div class="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="Type your message..."
          autocomplete="off"
        />

        <button id="send-btn">Send</button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
